    <style>
        :root {
            --bg-primary: #0a0f1c;
            --bg-secondary: #121a2e;
            --bg-card: #1a2540;
            --accent-gold: #ffd700;
            --accent-red: #ff4757;
            --accent-cyan: #00d4ff;
            --accent-green: #2ed573;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border-glow: rgba(255, 215, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-radius: 24px;
            margin-bottom: 30px;
            border: 1px solid var(--border-glow);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }

        /* Lesson Navigation */
        .lesson-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lesson-btn {
            padding: 12px 24px;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lesson-btn:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
        }

        .lesson-btn.active {
            background: linear-gradient(135deg, var(--accent-gold), #ffaa00);
            color: var(--bg-primary);
            border-color: var(--accent-gold);
        }

        /* Lesson Content */
        .lesson-content {
            display: none;
        }

        .lesson-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lesson-header {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            border-left: 4px solid var(--accent-gold);
        }

        .lesson-header h2 {
            font-size: 1.8rem;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        .lesson-header .lesson-title {
            font-size: 1.3rem;
            color: var(--text-secondary);
        }

        /* Audio Group */
        .audio-group {
            background: var(--bg-card);
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .audio-group:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 8px 40px rgba(0, 212, 255, 0.1);
        }

        .audio-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(255, 215, 0, 0.1));
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .audio-header:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(255, 215, 0, 0.15));
        }

        .audio-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .audio-badge {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .audio-badge svg {
            width: 18px;
            height: 18px;
        }

        .word-count {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .play-btn {
            background: linear-gradient(135deg, var(--accent-green), #1abc9c);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.3);
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(46, 213, 115, 0.5);
        }

        .play-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .play-btn.playing {
            background: linear-gradient(135deg, var(--accent-red), #e74c3c);
            animation: pulsate 1s ease-in-out infinite;
        }

        @keyframes pulsate {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3); }
            50% { box-shadow: 0 6px 30px rgba(255, 71, 87, 0.6); }
        }

        /* Words Grid */
        .words-container {
            padding: 20px;
        }

        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .word-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .word-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-gold), var(--accent-cyan));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .word-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 215, 0, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .word-card:hover::before {
            opacity: 1;
        }

        .hanzi {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .pinyin {
            font-size: 1.1rem;
            color: var(--accent-cyan);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .meaning {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .word-card.proper-noun {
            border-color: rgba(255, 215, 0, 0.3);
        }

        .word-card.proper-noun .hanzi {
            color: var(--accent-gold);
        }

        .proper-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 215, 0, 0.2);
            color: var(--accent-gold);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Stats */
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 15px 30px;
            background: var(--bg-card);
            border-radius: 12px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* Audio Player */
        .global-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            padding: 16px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .global-player.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .player-info {
            color: var(--text-primary);
            font-weight: 600;
        }

        .player-controls {
            display: flex;
            gap: 10px;
        }

        .player-btn {
            background: var(--bg-secondary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .player-btn:hover {
            background: var(--accent-gold);
        }

        .player-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .lesson-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }

            .words-grid {
                grid-template-columns: 1fr;
            }

            .audio-header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .play-btn {
                align-self: flex-end;
            }

            .stats-bar {
                gap: 10px;
            }

            .stat-item {
                padding: 12px 20px;
            }

            .global-player {
                width: calc(100% - 40px);
                padding: 12px 20px;
            }
        }

        /* Loading animation */
        .loading {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--bg-secondary);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

                                <div class="words-grid">
                    `;

                    if (group.words) {
                        group.words.forEach(word => {
                            html += `
                                <div class="word-card">
                                    <div class="hanzi">${word.hanzi}</div>
                                    <div class="pinyin">${word.pinyin}</div>
                                    <div class="meaning">${word.meaning}</div>
                                </div>
                            `;
                        });
                    }

                    if (group.properNouns) {
                        group.properNouns.forEach(word => {
                            html += `
                                <div class="word-card proper-noun">
                                    <span class="proper-tag">Atoqli ot</span>
                                    <div class="hanzi">${word.hanzi}</div>
                                    <div class="pinyin">${word.pinyin}</div>
                                    <div class="meaning">${word.meaning}</div>
                                </div>
                            `;
                        });
                    }

                    html += `
                                </div>
                            </div>
                        </div>
                    `;
                }

                lessonDiv.innerHTML = html;
                container.appendChild(lessonDiv);
            });
        }

        function showLesson(lessonNum) {
            // Update nav buttons
            document.querySelectorAll('.lesson-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx + 1 === lessonNum);
            });

            // Show/hide lessons
            document.querySelectorAll('.lesson-content').forEach(lesson => {
                lesson.classList.toggle('active', lesson.id === `lesson-${lessonNum}`);
            });
        }

        function calculateStats() {
            let totalWords = 0;
            let totalAudios = 0;

            lessonsData.forEach(lesson => {
                for (const group of Object.values(lesson.audioGroups)) {
                    totalWords += (group.words?.length || 0) + (group.properNouns?.length || 0);
                    totalAudios++;
                }
            });

            document.getElementById('total-words').textContent = totalWords;
            document.getElementById('total-audios').textContent = totalAudios;
        }

        function playAudio(audioId, btn) {
            const audioPlayer = document.getElementById('audio-player');
            const globalPlayer = document.getElementById('global-player');
            const audioName = document.getElementById('current-audio-name');

            // If same audio is playing, stop it
            if (currentPlayingBtn === btn && !audioPlayer.paused) {
                stopAudio();
                return;
            }

            // Stop previous
            if (currentPlayingBtn) {
                currentPlayingBtn.classList.remove('playing');
                currentPlayingBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
            }

            // Play new audio
            audioPlayer.src = `${audioId}.mp3`;
            audioPlayer.play().catch(e => {
                console.log('Audio not found or error:', e);
                alert(`Audio fayl topilmadi: ${audioId}.mp3`);
            });

            btn.classList.add('playing');
            btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
            currentPlayingBtn = btn;

            audioName.textContent = `${audioId}.mp3`;
            globalPlayer.classList.add('visible');

            audioPlayer.onended = () => {
                stopAudio();
            };
        }

        function stopAudio() {
            const audioPlayer = document.getElementById('audio-player');
            const globalPlayer = document.getElementById('global-player');

            audioPlayer.pause();
            audioPlayer.currentTime = 0;

            if (currentPlayingBtn) {
                currentPlayingBtn.classList.remove('playing');
                currentPlayingBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
                currentPlayingBtn = null;
            }

            globalPlayer.classList.remove('visible');
        }

        function toggleAudioGroup(header) {
            // Optional: Add collapse/expand functionality
        }
    </script>
</body>
