<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK3 Level 1 - Audio So'zlar</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1c;
            --bg-secondary: #121a2e;
            --bg-card: #1a2540;
            --accent-gold: #ffd700;
            --accent-red: #ff4757;
            --accent-cyan: #00d4ff;
            --accent-green: #2ed573;
            --accent-purple: #a855f7;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border-glow: rgba(255, 215, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-radius: 24px;
            margin-bottom: 30px;
            border: 1px solid var(--border-glow);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }

        .lesson-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lesson-btn {
            padding: 12px 24px;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lesson-btn:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
        }

        .lesson-btn.active {
            background: linear-gradient(135deg, var(--accent-gold), #ffaa00);
            color: var(--bg-primary);
            border-color: var(--accent-gold);
        }

        .lesson-content {
            display: none;
        }

        .lesson-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lesson-header {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            border-left: 4px solid var(--accent-gold);
        }

        .lesson-header h2 {
            font-size: 1.8rem;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        .lesson-header .lesson-title {
            font-size: 1.3rem;
            color: var(--text-secondary);
        }

        /* Section Headers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 30px 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .section-header h3 {
            font-size: 1.4rem;
            color: var(--text-primary);
        }

        .section-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .section-icon.kewen {
            background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
        }

        .section-icon.shengci {
            background: linear-gradient(135deg, var(--accent-cyan), #0891b2);
        }

        .section-icon.raokouling {
            background: linear-gradient(135deg, var(--accent-red), #dc2626);
        }

        /* Audio Group */
        .audio-group {
            background: var(--bg-card);
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .audio-group:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 8px 40px rgba(0, 212, 255, 0.1);
        }

        .audio-group.kewen {
            border-left: 4px solid var(--accent-purple);
        }

        .audio-group.shengci {
            border-left: 4px solid var(--accent-cyan);
        }

        .audio-group.raokouling {
            border-left: 4px solid var(--accent-red);
        }

        .audio-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(255, 215, 0, 0.1));
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .audio-header:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(255, 215, 0, 0.15));
        }

        .audio-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .audio-badge {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .audio-badge.kewen {
            background: var(--accent-purple);
        }

        .audio-badge.raokouling {
            background: var(--accent-red);
        }

        .audio-badge svg {
            width: 18px;
            height: 18px;
        }

        .audio-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .word-count {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .play-btn {
            background: linear-gradient(135deg, var(--accent-green), #1abc9c);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.3);
            flex-shrink: 0;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(46, 213, 115, 0.5);
        }

        .play-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .play-btn.playing {
            background: linear-gradient(135deg, var(--accent-red), #e74c3c);
            animation: pulsate 1s ease-in-out infinite;
        }

        @keyframes pulsate {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3); }
            50% { box-shadow: 0 6px 30px rgba(255, 71, 87, 0.6); }
        }

        /* Content Container */
        .content-container {
            padding: 20px;
        }

        /* Text Content (Kewen) */
        .text-content {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1.2rem;
            line-height: 2;
            white-space: pre-wrap;
        }

        .text-content .speaker {
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* Words Grid */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .word-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .word-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-gold), var(--accent-cyan));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .word-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 215, 0, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .word-card:hover::before {
            opacity: 1;
        }

        .hanzi {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .pinyin {
            font-size: 1.1rem;
            color: var(--accent-cyan);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .meaning {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .word-card.proper-noun {
            border-color: rgba(255, 215, 0, 0.3);
        }

        .word-card.proper-noun .hanzi {
            color: var(--accent-gold);
        }

        .proper-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 215, 0, 0.2);
            color: var(--accent-gold);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Stats */
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 15px 30px;
            background: var(--bg-card);
            border-radius: 12px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* Global Player */
        .global-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            padding: 16px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .global-player.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .player-info {
            color: var(--text-primary);
            font-weight: 600;
        }

        .player-btn {
            background: var(--bg-secondary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .player-btn:hover {
            background: var(--accent-gold);
        }

        .player-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--text-primary);
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--bg-secondary);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .lesson-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }

            .words-grid {
                grid-template-columns: 1fr;
            }

            .audio-header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .play-btn {
                align-self: flex-end;
            }

            .stats-bar {
                gap: 10px;
            }

            .stat-item {
                padding: 12px 20px;
            }

            .global-player {
                width: calc(100% - 40px);
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 HSK3 Level 1 - Audio So'zlar</h1>
            <p>新HSK教程1 - Matnlar va so'zlar audio bilan</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="total-lessons">0</div>
                <div class="stat-label">Darslar</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="total-words">0</div>
                <div class="stat-label">So'zlar</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="total-audios">0</div>
                <div class="stat-label">Audio fayllar</div>
            </div>
        </div>

        <div class="lesson-nav" id="lesson-nav">
            <!-- Generated -->
        </div>

        <div id="lessons-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">Ma'lumotlar yuklanmoqda...</div>
            </div>
        </div>
    </div>

    <div class="global-player" id="global-player">
        <div class="player-info">
            <span id="current-audio-name">--</span>
        </div>
        <button class="player-btn" onclick="stopAudio()">
            <svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
    </div>

    <audio id="audio-player"></audio>

    <script>
        let lessonsData = [];
        let currentPlayingBtn = null;

        // Load JSON and initialize
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('audio.json');
                const data = await response.json();
                lessonsData = data.hsk3_level1_audio.lessons;
                
                generateLessonNav();
                generateLessons();
                calculateStats();
                showLesson(1);
            } catch (error) {
                console.error('JSON yuklashda xato:', error);
                document.getElementById('lessons-container').innerHTML = `
                    <div class="loading">
                        <div class="loading-text" style="color: var(--accent-red);">
                            ❌ audio.json fayli topilmadi yoki xato!<br>
                            <small style="color: var(--text-secondary);">Fayl index.html bilan bir papkada bo'lishi kerak.</small>
                        </div>
                    </div>
                `;
            }
        });

        function generateLessonNav() {
            const nav = document.getElementById('lesson-nav');
            nav.innerHTML = '';
            lessonsData.forEach(lesson => {
                const btn = document.createElement('button');
                btn.className = 'lesson-btn';
                btn.textContent = `${lesson.lesson}-Dars`;
                btn.onclick = () => showLesson(lesson.lesson);
                nav.appendChild(btn);
            });
        }

        function generateLessons() {
            const container = document.getElementById('lessons-container');
            container.innerHTML = '';
            
            lessonsData.forEach(lesson => {
                const lessonDiv = document.createElement('div');
                lessonDiv.className = 'lesson-content';
                lessonDiv.id = `lesson-${lesson.lesson}`;
                
                let html = `
                    <div class="lesson-header">
                        <h2>${lesson.lesson}-Dars</h2>
                        <div class="lesson-title">${lesson.title}</div>
                    </div>
                `;

                // Group audios by type
                const kewenAudios = [];
                const shengciGroups = {};
                let raokouling = null;

                lesson.audios.forEach(audio => {
                    if (audio.type === '课文') {
                        audio.items.forEach(item => kewenAudios.push(item));
                    } else if (audio.type === '生词') {
                        // Group words by audio
                        audio.items.forEach(word => {
                            if (!shengciGroups[word.audio]) {
                                shengciGroups[word.audio] = { words: [], properNouns: [] };
                            }
                            shengciGroups[word.audio].words.push(word);
                        });
                        if (audio.proper_nouns) {
                            audio.proper_nouns.forEach(noun => {
                                if (!shengciGroups[noun.audio]) {
                                    shengciGroups[noun.audio] = { words: [], properNouns: [] };
                                }
                                shengciGroups[noun.audio].properNouns.push(noun);
                            });
                        }
                    } else if (audio.type === '绕口令') {
                        raokouling = audio;
                    }
                });

                // Kewen Section
                if (kewenAudios.length > 0) {
                    html += `
                        <div class="section-header">
                            <div class="section-icon kewen">📖</div>
                            <h3>课文 - Matnlar</h3>
                        </div>
                    `;

                    kewenAudios.forEach(kewen => {
                        const formattedContent = formatTextContent(kewen.content);
                        html += `
                            <div class="audio-group kewen">
                                <div class="audio-header">
                                    <div class="audio-info">
                                        <div class="audio-badge kewen">
                                            <svg viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                                            </svg>
                                            ${kewen.audio}.mp3
                                        </div>
                                        <span class="audio-title">${kewen.title}</span>
                                    </div>
                                    <button class="play-btn" onclick="playAudio('${kewen.audio}', this)">
                                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                    </button>
                                </div>
                                <div class="content-container">
                                    <div class="text-content">${formattedContent}</div>
                                </div>
                            </div>
                        `;
                    });
                }

                // Shengci Section
                const shengciKeys = Object.keys(shengciGroups).sort();
                if (shengciKeys.length > 0) {
                    html += `
                        <div class="section-header">
                            <div class="section-icon shengci">📝</div>
                            <h3>生词 - So'zlar</h3>
                        </div>
                    `;

                    shengciKeys.forEach(audioId => {
                        const group = shengciGroups[audioId];
                        const totalWords = group.words.length + group.properNouns.length;

                        html += `
                            <div class="audio-group shengci">
                                <div class="audio-header">
                                    <div class="audio-info">
                                        <div class="audio-badge">
                                            <svg viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                                            </svg>
                                            ${audioId}.mp3
                                        </div>
                                        <span class="word-count">${totalWords} ta so'z</span>
                                    </div>
                                    <button class="play-btn" onclick="playAudio('${audioId}', this)">
                                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                    </button>
                                </div>
                                <div class="content-container">
                                    <div class="words-grid">
                        `;

                        group.words.forEach(word => {
                            html += `
                                <div class="word-card">
                                    <div class="hanzi">${word.hanzi}</div>
                                    <div class="pinyin">${word.pinyin}</div>
                                    <div class="meaning">${word.meaning}</div>
                                </div>
                            `;
                        });

                        group.properNouns.forEach(word => {
                            html += `
                                <div class="word-card proper-noun">
                                    <span class="proper-tag">Atoqli ot</span>
                                    <div class="hanzi">${word.hanzi}</div>
                                    <div class="pinyin">${word.pinyin}</div>
                                    <div class="meaning">${word.meaning}</div>
                                </div>
                            `;
                        });

                        html += `
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }

                // Raokouling Section
                if (raokouling) {
                    html += `
                        <div class="section-header">
                            <div class="section-icon raokouling">🗣️</div>
                            <h3>绕口令 - Tez aytish</h3>
                        </div>
                        <div class="audio-group raokouling">
                            <div class="audio-header">
                                <div class="audio-info">
                                    <div class="audio-badge raokouling">
                                        <svg viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                                        </svg>
                                        ${raokouling.audio}.mp3
                                    </div>
                                    <span class="audio-title">${raokouling.title}</span>
                                </div>
                                <button class="play-btn" onclick="playAudio('${raokouling.audio}', this)">
                                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                </button>
                            </div>
                            <div class="content-container">
                                <div class="text-content" style="text-align: center; font-size: 1.5rem;">${raokouling.content}</div>
                            </div>
                        </div>
                    `;
                }

                lessonDiv.innerHTML = html;
                container.appendChild(lessonDiv);
            });
        }

        function formatTextContent(content) {
            // Highlight speakers (text before colon)
            return content.replace(/^([^：:]+)[：:]/gm, '<span class="speaker">$1：</span>');
        }

        function showLesson(lessonNum) {
            document.querySelectorAll('.lesson-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx + 1 === lessonNum);
            });

            document.querySelectorAll('.lesson-content').forEach(lesson => {
                lesson.classList.toggle('active', lesson.id === `lesson-${lessonNum}`);
            });
        }

        function calculateStats() {
            let totalWords = 0;
            let totalAudios = 0;

            lessonsData.forEach(lesson => {
                lesson.audios.forEach(audio => {
                    if (audio.type === '课文') {
                        totalAudios += audio.items.length;
                    } else if (audio.type === '生词') {
                        totalWords += audio.items.length;
                        if (audio.proper_nouns) totalWords += audio.proper_nouns.length;
                        // Count unique audio files
                        const audioSet = new Set(audio.items.map(w => w.audio));
                        if (audio.proper_nouns) {
                            audio.proper_nouns.forEach(n => audioSet.add(n.audio));
                        }
                        totalAudios += audioSet.size;
                    } else if (audio.type === '绕口令') {
                        totalAudios += 1;
                    }
                });
            });

            document.getElementById('total-lessons').textContent = lessonsData.length;
            document.getElementById('total-words').textContent = totalWords;
            document.getElementById('total-audios').textContent = totalAudios;
        }

        function playAudio(audioId, btn) {
            const audioPlayer = document.getElementById('audio-player');
            const globalPlayer = document.getElementById('global-player');
            const audioName = document.getElementById('current-audio-name');

            if (currentPlayingBtn === btn && !audioPlayer.paused) {
                stopAudio();
                return;
            }

            if (currentPlayingBtn) {
                currentPlayingBtn.classList.remove('playing');
                currentPlayingBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
            }

            audioPlayer.src = `${audioId}.mp3`;
            audioPlayer.play().catch(e => {
                console.log('Audio error:', e);
                alert(`Audio fayl topilmadi: ${audioId}.mp3`);
            });

            btn.classList.add('playing');
            btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
            currentPlayingBtn = btn;

            audioName.textContent = `${audioId}.mp3`;
            globalPlayer.classList.add('visible');

            audioPlayer.onended = () => stopAudio();
        }

        function stopAudio() {
            const audioPlayer = document.getElementById('audio-player');
            const globalPlayer = document.getElementById('global-player');

            audioPlayer.pause();
            audioPlayer.currentTime = 0;

            if (currentPlayingBtn) {
                currentPlayingBtn.classList.remove('playing');
                currentPlayingBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
                currentPlayingBtn = null;
            }

            globalPlayer.classList.remove('visible');
        }
    </script>
</body>
</html>
