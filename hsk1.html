<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Level 1 - Xitoy tili flashcardlar</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Playfair+Display:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #121827;
            --bg-card: linear-gradient(145deg, #1a2235 0%, #0f1525 100%);
            --accent-gold: #ffd700;
            --accent-red: #e63946;
            --accent-jade: #2dd4bf;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-glow: rgba(255, 215, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(45, 212, 191, 0.05) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffd700' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3)); }
            to { filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.5)); }
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-top: 10px;
            color: var(--text-primary);
        }

        .subtitle {
            color: var(--text-secondary);
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: thin;
        }

        .nav-tabs::-webkit-scrollbar {
            height: 6px;
        }

        .nav-tabs::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }

        .nav-tabs::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 3px;
        }

        .tab-btn {
            padding: 12px 24px;
            background: var(--bg-secondary);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            border-color: var(--accent-gold);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent-gold), #ff9500);
            color: var(--bg-primary);
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        /* Mode Buttons */
        .mode-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 14px 28px;
            background: transparent;
            border: 2px solid var(--accent-jade);
            border-radius: 50px;
            color: var(--accent-jade);
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-btn:hover {
            background: var(--accent-jade);
            color: var(--bg-primary);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(45, 212, 191, 0.4);
        }

        .mode-btn.active {
            background: var(--accent-jade);
            color: var(--bg-primary);
        }

        /* Flashcard Container */
        .flashcard-container {
            perspective: 1000px;
            margin: 40px auto;
            max-width: 500px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 350px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .flashcard-front {
            background: var(--bg-card);
        }

        .flashcard-back {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, #1a2840 0%, #0f1830 100%);
        }

        .hanzi {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .flashcard:hover .hanzi {
            transform: scale(1.05);
        }

        .pinyin {
            font-size: 1.8rem;
            color: var(--accent-jade);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .meaning {
            font-size: 1.4rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .card-hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* Navigation Controls */
        .card-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--accent-gold);
            color: var(--bg-primary);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .card-counter {
            font-size: 1.2rem;
            color: var(--text-secondary);
            min-width: 100px;
            text-align: center;
        }

        .card-counter span {
            color: var(--accent-gold);
            font-weight: 700;
        }

        /* Shuffle Button */
        .shuffle-btn {
            padding: 12px 24px;
            background: var(--accent-red);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shuffle-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.4);
        }

        /* Word List Mode */
        .word-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .word-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .word-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .word-card .hanzi {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .word-card .pinyin {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .word-card .meaning {
            font-size: 1rem;
        }

        /* Test Mode */
        .test-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .test-question {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 30px;
        }

        .test-hanzi {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .test-pinyin {
            font-size: 1.5rem;
            color: var(--accent-jade);
        }

        .test-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .test-option {
            padding: 20px;
            background: var(--bg-secondary);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            color: var(--text-primary);
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .test-option:hover:not(.disabled) {
            border-color: var(--accent-gold);
            transform: scale(1.02);
        }

        .test-option.correct {
            background: rgba(45, 212, 191, 0.2);
            border-color: var(--accent-jade);
            color: var(--accent-jade);
        }

        .test-option.wrong {
            background: rgba(230, 57, 70, 0.2);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .test-option.disabled {
            cursor: not-allowed;
        }

        .test-score {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-top: 20px;
        }

        .test-score span {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 1.5rem;
        }

        /* Search */
        .search-container {
            position: relative;
            max-width: 400px;
            margin: 0 auto 30px;
        }

        .search-input {
            width: 100%;
            padding: 16px 24px;
            padding-left: 50px;
            background: var(--bg-secondary);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 50px;
            color: var(--text-primary);
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--accent-gold);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 3rem;
            }

            .title {
                font-size: 1.5rem;
            }

            .stats-bar {
                flex-direction: column;
                gap: 15px;
            }

            .flashcard {
                height: 300px;
            }

            .hanzi {
                font-size: 4rem;
            }

            .test-options {
                grid-template-columns: 1fr;
            }

            .mode-buttons {
                flex-direction: column;
                align-items: center;
            }
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        /* Progress Bar */
        .progress-container {
            background: var(--bg-secondary);
            border-radius: 10px;
            height: 8px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-jade));
            border-radius: 10px;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">新HSK</div>
            <h1 class="title">HSK3 Level 1 - Flashcardlar</h1>
            <p class="subtitle">新HSK教程1 • 300 so'z • 15 dars</p>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalWords">300</div>
                <div class="stat-label">Jami so'zlar</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalLessons">15</div>
                <div class="stat-label">Darslar</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="learnedCount">0</div>
                <div class="stat-label">O'rganilgan</div>
            </div>
        </div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="So'z qidirish...">
        </div>

        <nav class="nav-tabs" id="lessonTabs">
            <button class="tab-btn active" data-lesson="all">Barcha so'zlar</button>
        </nav>

        <div class="mode-buttons">
            <button class="mode-btn active" data-mode="flashcard">
                <span>🎴</span> Flashcard
            </button>
            <button class="mode-btn" data-mode="list">
                <span>📋</span> Ro'yxat
            </button>
            <button class="mode-btn" data-mode="test">
                <span>✍️</span> Test
            </button>
        </div>

        <!-- Flashcard Mode -->
        <section id="flashcardMode">
            <div class="flashcard-container">
                <div class="flashcard" id="flashcard">
                    <div class="flashcard-face flashcard-front">
                        <div class="hanzi" id="cardHanzi">你好</div>
                        <div class="pinyin" id="cardPinyin">nǐ hǎo</div>
                        <div class="card-hint">Kartani bosing</div>

                    <div class="flashcard-face flashcard-back">
                        <div class="meaning" id="cardMeaning">salom</div>
                        <div class="card-hint">Davom etish uchun bosing</div>
                    </div>
                </div>
            </div>

            <div class="card-controls">
                <button class="nav-btn" id="prevBtn">◀</button>
                <div class="card-counter">
                    <span id="currentCard">1</span> / <span id="totalCards">0</span>
                </div>
                <button class="nav-btn" id="nextBtn">▶</button>
                <button class="shuffle-btn" id="shuffleBtn">
                    <span>🔀</span> Aralashtirish
                </button>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            </div>
        </section>

        <!-- List Mode -->
        <section id="listMode" class="hidden">
            <div class="word-list" id="wordList"></div>
        </section>

        <!-- Test Mode -->
        <section id="testMode" class="hidden">
            <div class="test-container">
                <div class="test-question">
                    <div class="test-hanzi" id="testHanzi">你好</div>
                    <div class="test-pinyin" id="testPinyin">nǐ hǎo</div>
                </div>
                <div class="test-options" id="testOptions"></div>
                <div class="test-score">
                    To'g'ri javoblar: <span id="correctCount">0</span> / <span id="questionCount">0</span>
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="shuffle-btn" id="nextQuestion">Keyingi savol →</button>
                </div>
            </div>
        </section>

        <footer>
            <p>HSK3 Level 1 Flashcardlar • Offline ishlatish uchun</p>
            <p>Made with ❤️ for Chinese learners</p>
        </footer>
    </div>

          {"hanzi": "时间", "pinyin": "shíjiān", "meaning": "vaqt"},
          {"hanzi": "接", "pinyin": "jiē", "meaning": "kutib olmoq"},
          {"hanzi": "住", "pinyin": "zhù", "meaning": "yashamoq, turmoq"},
          {"hanzi": "早", "pinyin": "zǎo", "meaning": "erta"},
          {"hanzi": "几", "pinyin": "jǐ", "meaning": "necha"},
          {"hanzi": "都", "pinyin": "dōu", "meaning": "hamma"}
        ],
        "proper_nouns": [
          {"hanzi": "北京", "pinyin": "Běijīng", "meaning": "Pekin"},
          {"hanzi": "西安", "pinyin": "Xī'ān", "meaning": "Sian"},
          {"hanzi": "大兴机场", "pinyin": "Dàxīng Jīchǎng", "meaning": "Daxing aeroporti"}
        ]
      }
    ]
  }
};

        // App State
        let allWords = [];
        let currentWords = [];
        let currentIndex = 0;
        let currentLesson = 'all';
        let currentMode = 'flashcard';
        let testCorrect = 0;
        let testTotal = 0;

        // Initialize
        function init() {
            extractAllWords();
            createLessonTabs();
            updateCurrentWords();
            renderFlashcard();
            setupEventListeners();
            updateStats();
        }

        function extractAllWords() {
            const lessons = hskData.hsk3_level1.lessons;
            lessons.forEach(lesson => {
                lesson.words.forEach(word => {
                    allWords.push({
                        ...word,
                        lesson: lesson.lesson,
                        lessonTitle: lesson.title
                    });
                });
                if (lesson.proper_nouns) {
                    lesson.proper_nouns.forEach(word => {
                        allWords.push({
                            ...word,
                            lesson: lesson.lesson,
                            lessonTitle: lesson.title,
                            isProperNoun: true
                        });
                    });
                }
            });
        }

        function createLessonTabs() {
            const tabsContainer = document.getElementById('lessonTabs');
            const lessons = hskData.hsk3_level1.lessons;
            
            lessons.forEach(lesson => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.dataset.lesson = lesson.lesson;
                btn.textContent = `${lesson.lesson}-dars`;
                tabsContainer.appendChild(btn);
            });
        }

        function updateCurrentWords() {
            if (currentLesson === 'all') {
                currentWords = [...allWords];
            } else {
                currentWords = allWords.filter(w => w.lesson === parseInt(currentLesson));
            }
            currentIndex = 0;
            document.getElementById('totalCards').textContent = currentWords.length;
            updateProgress();
        }

        function renderFlashcard() {
            if (currentWords.length === 0) return;
            
            const word = currentWords[currentIndex];
            document.getElementById('cardHanzi').textContent = word.hanzi;
            document.getElementById('cardPinyin').textContent = word.pinyin;
            document.getElementById('cardMeaning').textContent = word.meaning;
            document.getElementById('currentCard').textContent = currentIndex + 1;
            
            // Reset flip state
            document.getElementById('flashcard').classList.remove('flipped');
            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / currentWords.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateStats() {
            document.getElementById('totalWords').textContent = allWords.length;
            document.getElementById('totalLessons').textContent = hskData.hsk3_level1.lessons.length;
        }

        function renderWordList() {
            const container = document.getElementById('wordList');
            container.innerHTML = '';
            
            currentWords.forEach((word, index) => {
                const card = document.createElement('div');
                card.className = 'word-card fade-in';
                card.style.animationDelay = `${index * 0.05}s`;
                card.innerHTML = `
                    <div class="hanzi">${word.hanzi}</div>
                    <div class="pinyin">${word.pinyin}</div>
                    <div class="meaning">${word.meaning}</div>
                `;
                container.appendChild(card);
            });
        }

        function renderTest() {
            if (currentWords.length < 4) {
                alert("Test uchun kamida 4 ta so'z kerak!");
                return;
            }

            const questionWord = currentWords[Math.floor(Math.random() * currentWords.length)];
            document.getElementById('testHanzi').textContent = questionWord.hanzi;
            document.getElementById('testPinyin').textContent = questionWord.pinyin;

            // Generate options
            const options = [questionWord];
            while (options.length < 4) {
                const randomWord = allWords[Math.floor(Math.random() * allWords.length)];
                if (!options.find(o => o.hanzi === randomWord.hanzi)) {
                    options.push(randomWord);
                }
            }

            // Shuffle options
            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('testOptions');
            optionsContainer.innerHTML = '';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'test-option';
                btn.textContent = opt.meaning;
                btn.onclick = () => checkAnswer(btn, opt.hanzi === questionWord.hanzi, questionWord.meaning);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('questionCount').textContent = testTotal;
            document.getElementById('correctCount').textContent = testCorrect;
        }

        function checkAnswer(btn, isCorrect, correctMeaning) {
            const options = document.querySelectorAll('.test-option');
            options.forEach(opt => {
                opt.classList.add('disabled');
                if (opt.textContent === correctMeaning) {
                    opt.classList.add('correct');
                }
            });

            testTotal++;
            if (isCorrect) {
                btn.classList.add('correct');
                testCorrect++;
            } else {
                btn.classList.add('wrong');
            }

            document.getElementById('questionCount').textContent = testTotal;
            document.getElementById('correctCount').textContent = testCorrect;
        }

        function shuffleWords() {
            currentWords.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            renderFlashcard();
        }

        function setupEventListeners() {
            // Flashcard flip
            document.getElementById('flashcard').addEventListener('click', function() {
                this.classList.toggle('flipped');
            });

            // Navigation
            document.getElementById('prevBtn').addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderFlashcard();
                }
            });

            document.getElementById('nextBtn').addEventListener('click', () => {
                if (currentIndex < currentWords.length - 1) {
                    currentIndex++;
                    renderFlashcard();
                }
            });

            // Shuffle
            document.getElementById('shuffleBtn').addEventListener('click', shuffleWords);

            // Next question
            document.getElementById('nextQuestion').addEventListener('click', renderTest);

            // Lesson tabs
            document.getElementById('lessonTabs').addEventListener('click', (e) => {
                if (e.target.classList.contains('tab-btn')) {
                    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    currentLesson = e.target.dataset.lesson;
                    updateCurrentWords();
                    
                    if (currentMode === 'flashcard') {
                        renderFlashcard();
                    } else if (currentMode === 'list') {
                        renderWordList();
                    } else {
                        renderTest();
                    }
                }
            });

            // Mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentMode = this.dataset.mode;

                    document.getElementById('flashcardMode').classList.add('hidden');
                    document.getElementById('listMode').classList.add('hidden');
                    document.getElementById('testMode').classList.add('hidden');

                    if (currentMode === 'flashcard') {
                        document.getElementById('flashcardMode').classList.remove('hidden');
                        renderFlashcard();
                    } else if (currentMode === 'list') {
                        document.getElementById('listMode').classList.remove('hidden');
                        renderWordList();
                    } else {
                        document.getElementById('testMode').classList.remove('hidden');
                        testCorrect = 0;
                        testTotal = 0;
                        renderTest();
                    }
                });
            });

            // Search
            document.getElementById('searchInput').addEventListener('input', function() {
                const query = this.value.toLowerCase().trim();
                
                if (query === '') {
                    updateCurrentWords();
                } else {
                    currentWords = allWords.filter(w => 
                        w.hanzi.includes(query) || 
                        w.pinyin.toLowerCase().includes(query) || 
                        w.meaning.toLowerCase().includes(query)
                    );
                    currentIndex = 0;
                    document.getElementById('totalCards').textContent = currentWords.length;
                }

                if (currentMode === 'flashcard') {
                    renderFlashcard();
                } else if (currentMode === 'list') {
                    renderWordList();
                }
            });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (currentMode === 'flashcard') {
                    if (e.key === 'ArrowLeft') {
                        document.getElementById('prevBtn').click();
                    } else if (e.key === 'ArrowRight') {
                        document.getElementById('nextBtn').click();
                    } else if (e.key === ' ') {
                        e.preventDefault();
                        document.getElementById('flashcard').click();
                    }
                }
            });
        }

        // Start app
        init();
    </script>
</body>
</html>
